name: JapanTruth Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout japantruth-monitor
        uses: actions/checkout@v4

      - name: Checkout japantruth-nextjs
        uses: actions/checkout@v4
        with:
          repository: JapanTruth/japantruth-nextjs
          token: ${{ secrets.GH_TOKEN }}
          path: japantruth-nextjs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news monitor
        env:
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPO_PATH: ${{ github.workspace }}/japantruth-nextjs
          RSS2JSON_API_KEY: ${{ secrets.RSS2JSON_API_KEY }}
        run: python news_monitor_once.py
